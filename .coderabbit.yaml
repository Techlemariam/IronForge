# CodeRabbit Configuration
# Documentation: https://docs.coderabbit.ai/configuration/usage

language: "sv-SE"

reviews:
  profile: "comprehensive"
  request_review_command: "/review"
  high_level_summary: true
  auto_review:
    enabled: true
    ignore_title_keywords: ["WIP", "v0.0."]

chat:
  enabled: true
