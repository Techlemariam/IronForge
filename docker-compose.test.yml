version: '3.8'

services:
  # Isolated DB for CI Doctor diagnostics
  db-test:
    image: postgres:16-alpine
    container_name: ironforge-db-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ironforge_test
    healthcheck:
      # Sovereign Health Check: Fast sub-second check for CI Doctor
      test: [ "CMD-SHELL", "pg_isready -U postgres -d ironforge_test" ]
      interval: 2s
      timeout: 1s
      retries: 3
    networks:
      - ironforge-test-net

  # Lightweight agent runner for in-container diagnostics
  agent-worker:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: ironforge-agent-worker
    depends_on:
      db-test:
        condition: service_healthy
    networks:
      - ironforge-test-net

  # ──────────────────────────────────────────────
  # Playwright E2E Runner (Platform Matrix Tests)
  # Uses official MS image with all browsers pre-installed.
  # Eliminates host OS issues (Windows EPERM, browser version mismatches).
  # Usage: docker compose -f docker-compose.test.yml run playwright-runner
  # ──────────────────────────────────────────────
  playwright-runner:
    image: mcr.microsoft.com/playwright:v1.58.2-noble
    container_name: ironforge-playwright
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db-test:5432/ironforge_test
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      CI: "true"
    depends_on:
      db-test:
        condition: service_healthy
    entrypoint: [ "sh", "-c", "corepack enable && pnpm install --frozen-lockfile && npx prisma db push --force-reset && npx tsx tests/e2e/setup/e2e-seed.ts && pnpm exec playwright test" ]
    networks:
      - ironforge-test-net

  # ──────────────────────────────────────────────
  # Lighthouse CI Profiler
  # Runs lhci autorun inside a container to avoid Windows temp file issues.
  # Usage: docker compose -f docker-compose.test.yml run lhci-runner
  # ──────────────────────────────────────────────
  lhci-runner:
    image: node:22-slim
    container_name: ironforge-lhci
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db-test:5432/ironforge_test
      CI: "true"
    depends_on:
      db-test:
        condition: service_healthy
    entrypoint: [ "sh", "-c", "apt-get update && apt-get install -y chromium && corepack enable && pnpm install --frozen-lockfile && pnpm build && pnpm lhci" ]
    networks:
      - ironforge-test-net

networks:
  ironforge-test-net:
    driver: bridge
