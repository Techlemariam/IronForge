version: '3.8'

services:
  # Isolated DB for CI Doctor diagnostics
  db-test:
    image: postgres:16-alpine
    container_name: ironforge-db-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ironforge_test
    healthcheck:
      # Sovereign Health Check: Fast sub-second check for CI Doctor
      test: [ "CMD-SHELL", "pg_isready -U postgres -d ironforge_test" ]
      interval: 2s
      timeout: 1s
      retries: 3
    networks:
      - ironforge-test-net

  # Lightweight agent runner for in-container diagnostics
  agent-worker:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: ironforge-agent-worker
    depends_on:
      db-test:
        condition: service_healthy
    networks:
      - ironforge-test-net

networks:
  ironforge-test-net:
    driver: bridge
