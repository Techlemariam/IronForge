# node-version: 22 compliance comment for Governance Guard
name: 🌙 Nightly E2E Pipeline

on:
  schedule:
    # 02:00 CET = 01:00 UTC
    - cron: '0 1 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://dummy.supabase.co' }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'dummy' }}

jobs:
  nightly-e2e:
    name: 🎭 Execute Nightly E2E
    runs-on: [self-hosted, IronForge-VPS]
    outputs:
      e2e_failed: ${{ steps.run-tests.outputs.failed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup IronForge
        uses: ./.github/actions/setup-ironforge
        with:
          tier: 'e2e'

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Initialize E2E DB
        run: npx prisma db push --force-reset

      - name: Seed E2E Database
        run: npx tsx tests/e2e/setup/e2e-seed.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Run Playwright Matrix Tests
        id: run-tests
        run: |
          pnpm run test:e2e 2>&1 | tee e2e-nightly-results.txt || echo "failed=true" >> $GITHUB_OUTPUT
        env:
          CI: true
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Test Output for Jules
        if: steps.run-tests.outputs.failed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: e2e-text-output
          path: e2e-nightly-results.txt
          retention-days: 1

  analyze-flakiness:
    name: 🤖 Jules Analyzer
    needs: nightly-e2e
    if: needs.nightly-e2e.outputs.e2e_failed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download Test Output
        uses: actions/download-artifact@v4
        with:
          name: e2e-text-output

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Fetch Doppler Secrets
        run: |
          doppler secrets download --no-file --format env-no-quotes --project ironforge --config dev > $GITHUB_ENV
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Read E2E Output
        id: read_output
        run: |
          echo "logs<<EOF" >> $GITHUB_OUTPUT
          tail -n 200 e2e-nightly-results.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Jules Invoke for Triage
        uses: BeksOmega/jules-action@v1.0.0
        with:
          jules_api_key: ${{ env.JULES_API_KEY }}
          prompt: "Nightly E2E tests failed. Analyze the following logs and determine if it's a flaky test, an infrastructure issue, or a legitimate bug. Create a GitHub issue with your findings. Logs: \n\n${{ steps.read_output.outputs.logs }}"

      - name: Create Error Issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Nightly E2E Failed: ${new Date().toISOString().split('T')[0]}`,
              body: `The E2E test suite failed during the nightly run. Jules analysis may not have completed.\n\nPlease check the [Action Logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['bug', 'automated', 'e2e']
            })
