# node-version: 22 compliance comment for Governance Guard
name: Autonomous Trigger (Mobile)

on:
  workflow_dispatch:
    inputs:
      workflow:
        description: 'Workflow to run'
        required: true
        default: 'polish'
        type: choice
        options:
          - night-shift
          - polish
          - git-hygiene
          - cleanup
          - debt-attack
          - security
          - sprint-auto
          - factory
          - triage
          - ci-doctor
          - autonomous-gardener
          - autonomous-sim
          - evolve
          - perf
          - platform
          - spec
          - sync-roadmap
          - sync-project
          - monitor-all
          - monitor-ui
      model:
        description: 'Gemini Model'
        required: true
        default: 'gemini-2.5-flash'
        type: choice
        options:
          - gemini-2.5-flash
          - gemini-2.5-pro

permissions:
  contents: write
  pull-requests: write

# Prevent overlapping runs of the same autonomous workflow on the self-hosted runner
concurrency:
  group: autonomous-${{ github.workflow }}-${{ inputs.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-autonomous-workflow:
    runs-on: self-hosted
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Execute Workflow
        shell: powershell
        run: |
          Set-Location $env:GITHUB_WORKSPACE
          .\scripts\workflow-launcher.ps1 -Workflow "${{ inputs.workflow }}" -Model "${{ inputs.model }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
