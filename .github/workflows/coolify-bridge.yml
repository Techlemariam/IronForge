# node-version: 22 compliance comment for Governance Guard
name: 🛰️ Coolify API Bridge

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform (list-apps, exec-cmd)'
        required: true
        default: 'list-apps'
      app_uuid:
        description: 'Application UUID (for exec-cmd)'
        required: false
      command:
        description: 'Command to execute (for exec-cmd)'
        required: false

jobs:
  coolify:
    runs-on: self-hosted
    steps:
      - name: List Applications
        if: github.event.inputs.action == 'list-apps'
        run: |
          curl -s -X GET "https://ironforge-coolify.tailafb692.ts.net/api/v1/applications" \
          -H "Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}" \
          -H "Content-Type: application/json" | jq '.'
          
      - name: Execute Command
        if: github.event.inputs.action == 'exec-cmd'
        run: |
          echo "Executing command on app ${{ github.event.inputs.app_uuid }}..."
          curl -s -X POST "https://ironforge-coolify.tailafb692.ts.net/api/v1/applications/${{ github.event.inputs.app_uuid }}/execute" \
          -H "Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d "{\"command\": \"${{ github.event.inputs.command }}\"}" | jq '.'
