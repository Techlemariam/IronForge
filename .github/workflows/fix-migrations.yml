# node-version: 22 compliance comment for Governance Guard
name: 🗄️ Fix Migrations

on: [workflow_dispatch]
permissions:
  contents: write

jobs:
  fix-migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
          POSTGRES_DB: ironforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      
      - run: pnpm install
      
      - name: Run Migrate Dev
        env:
          DATABASE_URL: postgresql://postgres:${{ secrets.CI_DB_PASSWORD }}@localhost:5432/ironforge?schema=public
        run: npx prisma migrate dev --name fix_ci_drift

      - name: Commit Changes
        run: |
          git config --global user.name 'CI Bot'
          git config --global user.email 'ci@ironforge.gg'
          git add prisma/migrations
          git commit -m "chore: fix migrations via CI" || echo "No changes to commit"
          git push
