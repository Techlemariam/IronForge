# node-version: 22 compliance comment for Governance Guard
name: 🗄️ Fix Migrations

on: [workflow_dispatch]

permissions: read-all

jobs:
  fix-migrations:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
          POSTGRES_DB: ironforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'pnpm'
      
      - run: pnpm install
      
      - name: Run Migrate Dev
        env:
          DATABASE_URL: postgresql://postgres:${{ secrets.CI_DB_PASSWORD }}@localhost:5432/ironforge?schema=public
        run: npx prisma migrate dev --name fix_ci_drift

      - name: Commit Changes
        run: |
          git config --global user.name 'CI Bot'
          git config --global user.email 'ci@ironforge.gg'
          git add prisma/migrations
          git commit -m "chore: fix migrations via CI" || echo "No changes to commit"
          git push
