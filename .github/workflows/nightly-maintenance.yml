# =============================================================================
# NIGHTLY MAINTENANCE WORKFLOW
# =============================================================================
# Autonomous nightly maintenance triggered by cron or manual dispatch.
# Integrates with Antigravity Auto Wake-up configuration.
#
# Schedule: Monday, Wednesday, Friday at 02:00 CET (01:00 UTC)
# =============================================================================

# node-version: 22 compliance comment for Governance Guard
name: 🌙 Nightly Maintenance

on:
  schedule:
    # 01:00 UTC = 02:00 CET (Europe/Stockholm)
    - cron: "0 1 * * 1,3,5"
  workflow_dispatch:
    inputs:
      workflow:
        description: "Workflow to run"
        required: true
        default: "/night-shift"
        type: choice
        options:
          - "/night-shift"
          - "/health-check"
          - "/monitor-debt"
          - "/evolve"
      dry_run:
        description: "Dry run (no commits)"
        required: false
        default: false
        type: boolean
      skip_pr:
        description: "Skip PR creation"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9"

jobs:
  # ===========================================================================
  # PRE-FLIGHT CHECKS
  # ===========================================================================
  preflight:
    name: 🛫 Pre-flight Checks
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      workflow: ${{ steps.check.outputs.workflow }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check conditions
        id: check
        run: |
          echo "📋 Checking pre-flight conditions..."
          
          # Check for open night-shift PRs
          OPEN_PRS=$(gh pr list --label "night-shift" --state open --json number -q 'length')
          if [ "$OPEN_PRS" -gt 0 ]; then
            echo "⚠️ Found $OPEN_PRS open night-shift PR(s), skipping..."
            echo "should_run=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Check if main branch CI is green
          LAST_RUN=$(gh run list --branch main --workflow "IronForge CI/CD" --limit 1 --json conclusion -q '.[0].conclusion')
          if [ "$LAST_RUN" != "success" ]; then
            echo "⚠️ Last CI run was not successful ($LAST_RUN), skipping..."
            echo "should_run=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "✅ All pre-flight checks passed"
          echo "should_run=true" >> $GITHUB_OUTPUT
          echo "workflow=${{ inputs.workflow || '/night-shift' }}" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================================================
  # MAINTENANCE TASKS
  # ===========================================================================
  maintenance:
    name: 🔧 Run Maintenance
    needs: preflight
    if: needs.preflight.outputs.should_run == 'true'
    runs-on: [self-hosted, IronForge-Local]
    container:
      image: ghcr.io/techlemariam/ironforge/ironforge-agent:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    outputs:
      changes_made: ${{ steps.changes.outputs.changes_made }}
      summary: ${{ steps.summary.outputs.summary }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup IronForge
        uses: ./.github/actions/setup-ironforge

      - name: Create maintenance branch
        run: |
          BRANCH="night-shift/$(date +%Y-%m-%d)"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      # -----------------------------------------------------------------------
      # TASK 1: Deep Security Audit (Snyk)
      # -----------------------------------------------------------------------
      - name: "🛡️ L3: Security Audit (Snyk)"
        id: security
        continue-on-error: true
        run: |
          echo "## 🛡️ Snyk Security Audit" >> $GITHUB_STEP_SUMMARY
          pnpm run security 2>&1 | tee security-output.txt
          
          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            echo "✅ Security audit passed" >> $GITHUB_STEP_SUMMARY
            echo "security_clean=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Security vulnerabilities found" >> $GITHUB_STEP_SUMMARY
            echo "security_clean=false" >> $GITHUB_OUTPUT
          fi

      # -----------------------------------------------------------------------
      # TASK 2: Dependency Evolution (/evolve)
      # -----------------------------------------------------------------------
      - name: "🧬 L3: Dependency Evolution"
        id: evolve
        continue-on-error: true
        run: |
          echo "## 🧬 Dependency Evolution" >> $GITHUB_STEP_SUMMARY
          
          # Update minor/patch versions
          if [ "${{ inputs.workflow }}" = "/evolve" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            echo "Running dependency evolution..."
            pnpm update --latest 2>&1 | tee update-output.txt || true
            
            if git diff --quiet package.json pnpm-lock.yaml; then
              echo "✅ No dependency updates available" >> $GITHUB_STEP_SUMMARY
              echo "deps_updated=false" >> $GITHUB_OUTPUT
            else
              echo "📦 Dependencies updated" >> $GITHUB_STEP_SUMMARY
              echo "deps_updated=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "Skipping full update"
            echo "deps_updated=false" >> $GITHUB_OUTPUT
          fi

      # -----------------------------------------------------------------------
      # TASK 3: Exhaustive E2E Verification
      # -----------------------------------------------------------------------
      - name: "🎭 L3: Exhaustive E2E"
        id: e2e
        continue-on-error: true
        run: |
          echo "## 🎭 Exhaustive E2E" >> $GITHUB_STEP_SUMMARY
          pnpm run test:exhaustive 2>&1 | tee e2e-output.txt
          
          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            echo "✅ Exhaustive E2E passed" >> $GITHUB_STEP_SUMMARY
            echo "e2e_clean=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Exhaustive E2E failed" >> $GITHUB_STEP_SUMMARY
            echo "e2e_clean=false" >> $GITHUB_OUTPUT
          fi

      # -----------------------------------------------------------------------
      # TASK 4: Quality Checks (L3 specific)
      # -----------------------------------------------------------------------
      - name: "🔍 L3: Quality Audit"
        id: quality
        run: |
          echo "## 🔍 L3 Quality Audit" >> $GITHUB_STEP_SUMMARY
          pnpm run ci:l3
          echo "✅ L3 Quality Audit complete" >> $GITHUB_STEP_SUMMARY

      # -----------------------------------------------------------------------
      # TASK 5: Generate Summary
      # -----------------------------------------------------------------------
      - name: 📋 Generate Summary
        id: summary
        run: |
          SUMMARY=$(cat << 'EOF'
          ## 🌙 L3 Assurance Summary
          
          | Task | Status |
          |:-----|:-------|
          | Security (Snyk) | ${{ steps.security.outputs.security_clean == 'true' && '✅ Clean' || '⚠️ Vulnerabilities' }} |
          | Dependencies | ${{ steps.evolve.outputs.deps_updated == 'true' && '📦 Evolved' || '✅ Stable' }} |
          | Exhaustive E2E | ${{ steps.e2e.outputs.e2e_clean == 'true' && '✅ Passed' || '❌ Failed' }} |
          
          **Tier:** L3 (Deep Assurance)
          **Run Time:** $(date -u +"%Y-%m-%d %H:%M UTC")
          EOF
          )
          
          echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 💾 Commit Changes
        id: changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: nightly maintenance updates [skip ci]"
          branch: ${{ env.BRANCH }}
          file_pattern: '.'
          skip_dirty_check: false    
          create_branch: true


  # ===========================================================================
  # CREATE PR
  # ===========================================================================
  create-pr:
    name: 📬 Create PR
    needs: [preflight, maintenance]
    if: |
      needs.maintenance.outputs.changes_made == 'true' && 
      inputs.skip_pr != true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create Pull Request
        run: |
          BRANCH="night-shift/$(date +%Y-%m-%d)"
          
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "🌙 Night Shift: $(date +%Y-%m-%d)" \
            --body "${{ needs.maintenance.outputs.summary }}" \
            --label "night-shift,automated" \
            --assignee "${{ github.repository_owner }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================================================
  # FAILURE NOTIFICATION
  # ===========================================================================
  notify-failure:
    name: 🚨 Notify Failure
    needs: [preflight, maintenance]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Create failure issue
        uses: actions/github-script@v8
        with:
          script: |
            const title = `🌙 Night Shift Failed: ${new Date().toISOString().split('T')[0]}`;
            const body = `
            ## Night Shift Workflow Failed
            
            **Run:** [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            **Time:** ${new Date().toISOString()}
            
            Please investigate and fix any issues.
            
            /cc @${context.repo.owner}
            `;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['night-shift', 'bug', 'automated']
            });
