# node-version: 22 compliance comment for Governance Guard
name: 🚀 Coolify Deploy

on:
  push:
    branches: [develop]
  release:
    types: [published]
  workflow_dispatch:

permissions: read-all

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Trigger Coolify Deployment
        run: |
          curl "${{ secrets.COOLIFY_WEBHOOK }}"
