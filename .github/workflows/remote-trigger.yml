# =============================================================================
# REMOTE TRIGGER WORKFLOW
# =============================================================================
# Enables external systems (n8n, Moltbot, Slack, etc.) to trigger agent
# workflows via GitHub's workflow_dispatch API.
#
# Endpoints:
#   - workflow_dispatch: Manual trigger via GitHub UI or API
#   - repository_dispatch: Webhook trigger from external systems
# =============================================================================

name: 🎯 Remote Trigger

on:
  workflow_dispatch:
    inputs:
      workflow:
        description: "Agent workflow to run (e.g., night-shift, health-check, polish)"
        required: true
        type: string
      mode:
        description: "Execution Mode"
        required: true
        type: choice
        options:
          - "antigravity-signal"
          - "direct-execution"
        default: "antigravity-signal"
      model:
        description: "Gemini model to use"
        required: true
        type: choice
        options:
          - "gemini-2.5-flash"
          - "gemini-2.5-pro"
        default: "gemini-2.5-flash"
      branch:
        description: "Target branch"
        required: false
        default: "main"
      dry_run:
        description: "Dry run mode (no commits)"
        required: false
        type: boolean
        default: false
  repository_dispatch:
    types:
      - remote-trigger
      - n8n-trigger
      - moltbot-trigger
      - google-api-trigger
      - universal-trigger

concurrency:
  group: remote-${{ github.workflow }}-${{ github.event.inputs.workflow || github.event.client_payload.workflow || 'default' }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  NODE_VERSION: "22"

jobs:
  validate:
    name: 🔐 Validate & Route
    runs-on: ubuntu-latest
    outputs:
      workflow: ${{ steps.parse.outputs.workflow }}
      mode: ${{ steps.parse.outputs.mode }}
      model: ${{ steps.parse.outputs.model }}
      branch: ${{ steps.parse.outputs.branch }}
      dry_run: ${{ steps.parse.outputs.dry_run }}
      is_valid: ${{ steps.validate.outputs.is_valid }}
    steps:
      - name: Parse Input
        id: parse
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "workflow=${{ inputs.workflow }}" >> $GITHUB_OUTPUT
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
            echo "model=${{ inputs.model }}" >> $GITHUB_OUTPUT
            echo "branch=${{ inputs.branch }}" >> $GITHUB_OUTPUT
            echo "dry_run=${{ inputs.dry_run }}" >> $GITHUB_OUTPUT
          else
            # repository_dispatch from Google API/n8n/Moltbot
            WORKFLOW="${{ github.event.client_payload.workflow || 'health-check' }}"
            MODE="${{ github.event.client_payload.mode || 'antigravity-signal' }}"
            MODEL="${{ github.event.client_payload.model || 'gemini-2.5-flash' }}"
            BRANCH="${{ github.event.client_payload.branch || 'main' }}"
            DRY_RUN="${{ github.event.client_payload.dry_run || 'false' }}"
            echo "workflow=$WORKFLOW" >> $GITHUB_OUTPUT
            echo "mode=$MODE" >> $GITHUB_OUTPUT
            echo "model=$MODEL" >> $GITHUB_OUTPUT
            echo "branch=$BRANCH" >> $GITHUB_OUTPUT
            echo "dry_run=$DRY_RUN" >> $GITHUB_OUTPUT
          fi

      - name: Validate Token (repository_dispatch only)
        id: validate
        if: github.event_name == 'repository_dispatch'
        env:
          REMOTE_TRIGGER_SECRET: ${{ secrets.REMOTE_TRIGGER_SECRET }}
          PROVIDED_TOKEN: ${{ github.event.client_payload.token }}
        run: |
          if [ -z "$REMOTE_TRIGGER_SECRET" ]; then
            echo "⚠️ REMOTE_TRIGGER_SECRET not configured. Allowing request."
            echo "is_valid=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          if [ "$PROVIDED_TOKEN" = "$REMOTE_TRIGGER_SECRET" ]; then
            echo "✅ Token validated"
            echo "is_valid=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Invalid token"
            echo "is_valid=false" >> $GITHUB_OUTPUT
            exit 1
          fi

  execute:
    name: 🚀 Execute (${{ needs.validate.outputs.mode }})
    needs: validate
    if: needs.validate.outputs.is_valid != 'false'
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.branch }}
          fetch-depth: 0

      - name: Setup IronForge
        uses: ./.github/actions/setup-ironforge

      - name: 📋 Log Execution
        run: |
          echo "## 🎯 Remote Trigger Execution" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|:----------|:------|" >> $GITHUB_STEP_SUMMARY
          echo "| Workflow | \`${{ needs.validate.outputs.workflow }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Mode | \`${{ needs.validate.outputs.mode }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Model | \`${{ needs.validate.outputs.model }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | \`${{ github.actor }}\` |" >> $GITHUB_STEP_SUMMARY

      - name: 📡 Dispatch Antigravity Signal
        if: needs.validate.outputs.mode == 'antigravity-signal'
        shell: pwsh
        run: |
          $workflow = "${{ needs.validate.outputs.workflow }}" -replace "^/", ""
          $model = "${{ needs.validate.outputs.model }}"
          
          $taskContent = @"
          # Autonomous Mission: $workflow
          Model: $model
          Triggered via Remote: ${{ github.event_name }} at $(Get-Date -Format "o")
          
          ## Instructions
          Execute the `/$workflow` workflow using the $model model.
          
          ## Context
          - Workflow: $workflow
          - Mode: Antigravity Signal
          - Actor: ${{ github.actor }}
          - RunID: ${{ github.run_id }}
          "@
          
          if (!(Test-Path ".agent\tasks")) { New-Item -ItemType Directory -Path ".agent\tasks" -Force }
          Set-Content -Path ".agent\tasks\current.md" -Value $taskContent
          Write-Host "✅ Task signal written to .agent\tasks\current.md"

      - name: 🔧 Direct Execution (Fallback/L3)
        if: needs.validate.outputs.mode == 'direct-execution'
        env:
          WORKFLOW_INPUT: ${{ needs.validate.outputs.workflow }}
          MODEL_INPUT: ${{ needs.validate.outputs.model }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
          N8N_HOST: "https://ironforge-coolify.tailafb692.ts.net"
          COOLIFY_API_KEY: ${{ secrets.COOLIFY_API_KEY }}
          NODE_TLS_REJECT_UNAUTHORIZED: "0"
        shell: pwsh
        run: |
          $workflowName = $env:WORKFLOW_INPUT -replace "^/", ""
          Write-Host "🚀 Running Direct Execution: $workflowName" -ForegroundColor Cyan
          if ($workflowName -eq "bootstrap-n8n") {
            node scripts/ci/activate-n8n-bootstrap.js
          } else {
            .\scripts\workflow-launcher.ps1 -Workflow $workflowName -Model $env:MODEL_INPUT
          }


      - name: 📢 Report Result
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const workflow = '${{ needs.validate.outputs.workflow }}';
            const status = '${{ job.status }}';
            const runUrl = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}';
            
            // Create a comment on the most recent commit or issue
            console.log(`Remote trigger completed: ${workflow} - ${status}`);
            console.log(`Run URL: ${runUrl}`);
