# node-version: 22 compliance comment for Governance Guard
name: Jules Autonomous Mission

on:
  push:
    branches:
      - 'fix/ci-harmonization-run-775'
  workflow_dispatch:
    inputs:
      mission:
        description: 'Mission description for Jules'
        required: true
        default: 'Identify and fix technical debt in the current branch.'
        type: string

jobs:
  jules-invoke:
    name: Invoke Jules
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: '22'
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v1

      - name: Fetch Doppler Secrets
        uses: dopplerhq/secrets-fetch-action@v1
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          inject-env-vars: true

      - name: Jules Invoke
        uses: BeksOmega/jules-action@v1.0.0
        with:
          jules_api_key: ${{ env.JULES_API_KEY }}
          prompt: ${{ inputs.mission }}

      - name: Jules PR Comment
        if: github.event_name == 'pull_request'
        uses: BeksOmega/jules-publish@v1.0.0
        with:
          jules_api_key: ${{ env.JULES_API_KEY }}
          pr_number: ${{ github.event.pull_request.number }}

      - name: Send Feedback to Jules
        if: always()
        uses: BeksOmega/jules-comms@v1.0.0
        with:
          jules_api_key: ${{ env.JULES_API_KEY }}
          feedback_users: ${{ github.actor }}

