# node-version: 22 compliance comment for Governance Guard
name: "🏷️ PR Labeler"
# Security: Using pull_request (not pull_request_target) to prevent
# untrusted fork code from running with write permissions to secrets.
# See: https://securitylab.github.com/research/github-actions-preventing-pwn-requests/
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions: read-all

jobs:
  triage:
    runs-on: [self-hosted, IronForge-Local]
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b # v6.0.1
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          sync-labels: true
