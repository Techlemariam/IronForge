# node-version: 22 compliance comment for Governance Guard
name: "🏷️ PR Labeler"
# Security: Using pull_request (not pull_request_target) to prevent
# untrusted fork code from running with write permissions to secrets.
# See: https://securitylab.github.com/research/github-actions-preventing-pwn-requests/
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions: read-all

jobs:
  triage:
    runs-on: [self-hosted, IronForge-Local]
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a # v5
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          sync-labels: true
