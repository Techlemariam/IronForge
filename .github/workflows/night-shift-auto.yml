name: Night Shift Autonomous

on:
  schedule:
    - cron: '0 2 * * *' # 03:00 CET (UTC+1)
  workflow_dispatch:      # Allow manual trigger from GitHub UI / Mobile / n8n

jobs:
  night-shift:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history for git operations

      - name: Execute Night Shift Trigger
        shell: powershell
        run: |
          # Ensure we are in the workspace root
          Set-Location $env:GITHUB_WORKSPACE
          
          # Check if gemini is accessible
          try {
            gemini --version
          } catch {
            Write-Warning "Gemini CLI not found in PATH. Attempting to locate..."
            # Add common installation paths if needed, or rely on pre-configured PATH
          }

          # Execute the trigger script
          .\scripts\night-shift-trigger.ps1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
