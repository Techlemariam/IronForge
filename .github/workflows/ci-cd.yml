# Sovereign Service Layer Active: Optimized for sub-second readiness
name: IronForge CI/CD

on:
  push:
    branches: [main, release, fix/*]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.agent/**'
      - '.vscode/**'
  pull_request:
    branches: [main, release, fix/*]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.agent/**'
      - '.vscode/**'
  workflow_dispatch:


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  DIRECT_URL: ${{ secrets.DIRECT_URL }}
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://dummy.supabase.co' }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'dummy' }}
  SKIP_ENV_VALIDATION: true

jobs:

  # ==================================================================
  # TIER L1: FAST FEEDBACK (PR)
  # Objective: Verify logic & syntax in < 5 minutes.
  # ==================================================================
  l1-verify:
    name: "⚡ L1: Verify"
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/heads/fix/')
    runs-on: [self-hosted, IronForge-Local] # Target specific local runner
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for turbo comparison
      - uses: ./.github/actions/setup-ironforge
        with:
          tier: 'l1'
      - name: Generate Prisma Client
        run: npx prisma generate
      - name: Initialize DB (L1)
        run: |
          # Managed-services assumes DB is already healthy (0s wait)
          npx prisma db push
      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-l1-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-l1-${{ runner.os }}-
      - name: Turbo L1 Verify (Differential)
        run: pnpm run ci:l1

      # ==================================================================
      # ACTIVE HANDOVER: Proactive Monitoring on Success
      # ==================================================================
      - name: "✨ Active Handover: Proactive Optimization"
        if: success()
        run: |
          echo "❇️ CI Doctor: Success detected. Initiating Proactive Monitoring..."
          mkdir -p .agent/tasks
          
          # Check for CodeRabbit presence to trigger Optimizer
          if gh pr view --json reviews -q '.reviews[].author.login' | grep -q "coderabbit"; then
             echo "🤖 Triggering Code Optimizer..."
             echo "OPTIMIZE: Implement CodeRabbit suggestions in $GITHUB_SHA" > .agent/tasks/doctor-code-optimize.md
          fi

          # Proactive Security Check
          echo "🛡️ Triggering Security Sentinel..."
          echo "HARDEN: Proactive security scan for $GITHUB_SHA" > .agent/tasks/doctor-security-sentinel.md


      # ==================================================================
      # ACTIVE HANDOVER: Auto-Triage on Failure
      # ==================================================================
      - name: "🩺 Active Handover: Auto-Triage"
        if: failure()
        run: |
          echo "🚨 CI Doctor: Failure detected in L1. Initiating Board-Level Triage..."
          
          # 1. Check for Security limits (doctor-security)
          if grep -q "limit of private tests\|snyk" /tmp/combined-logs.txt 2>/dev/null; then
             echo "🛡️ Dispatching Security Specialist..."
             echo "FIX: Security limit reached in $GITHUB_SHA" > .agent/tasks/doctor-security-signal.md
          fi

          # 2. Check for Meta-workflow failures (doctor-meta)
          if grep -q "PR Labeler\|Release Drafter\|DeepSource" /tmp/combined-logs.txt 2>/dev/null; then
             echo "⚙️ Dispatching Meta Specialist..."
             echo "FIX: Meta/Config failure in $GITHUB_SHA" > .agent/tasks/doctor-meta-signal.md
          fi

          # 3. Check for Build/Type/Lint failures (doctor-code)
          if grep -q "ELIFECYCLE\|TypeCheck\|ESLint" /tmp/combined-logs.txt 2>/dev/null; then
             echo "🔬 Dispatching Code Specialist..."
             echo "FIX: Type/Lint failure in $GITHUB_SHA" > .agent/tasks/doctor-code-signal.md
          fi
          
          # 4. Check for DB/Infra failures (doctor-infra)
          if grep -q "ECONNREFUSED\|PrismaClientInitializationError" /tmp/combined-logs.txt 2>/dev/null; then
             echo "🛡️ Dispatching Infra Specialist..."
             mkdir -p .agent/tasks
             echo "FIX: Infra failure in $GITHUB_SHA" > .agent/tasks/doctor-infra-signal.md
          fi


  # ==================================================================
  # TIER L2: FULL VERIFICATION (MERGE)
  # Objective: Comprehensive check before deployment.
  # ==================================================================
  l2-verification:
    name: "🚀 L2: Verification"
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/fix/')
    runs-on: [self-hosted, IronForge-Local] # Target specific local runner
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-ironforge
      - run: npx prisma generate
      - name: Cache Turbo L2
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-l2-${{ runner.os }}-${{ github.sha }}
      - name: Initialize DB (L2)
        run: |
          sleep 15
          npx prisma db push
      - name: Turbo L2 verification
        run: pnpm run ci:l2

  # 🐳 DOCKER VERIFICATION
  docker-verify:
    name: "🐳 Docker: Build Verify"
    needs: l2-verification
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/fix/')
    runs-on: [self-hosted, IronForge-Local]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Production Image
        run: |
          docker build -t ironforge-app:latest --target runner .
      - name: Verify Image
        run: |
          docker image inspect ironforge-app:latest

  # 🎭 E2E VERIFICATION
  e2e:
    name: 🎭 E2E Tests
    needs: [db-guard]
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    runs-on: [self-hosted, IronForge-Local] # Target specific local runner
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-ironforge
        with:
          tier: 'e2e'
      - name: Generate Prisma Client
        run: npx prisma generate
      - name: Cache Playwright Browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps
      - name: Initialize E2E DB
        run: |
          # Managed-services assumes DB is already healthy
          npx prisma db push --force-reset
      - name: Seed E2E Database
        run: npx tsx tests/e2e/setup/e2e-seed.ts
        env:
          # DATABASE_URL is now managed by setup-ironforge to point to namespaced port
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      - name: Run Playwright Tests
        run: npx playwright test
        env:
          CI: true
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          # DATABASE_URL is now managed by setup-ironforge

  # 🗄️ DATABASE GUARD
  db-guard:
    name: 🗄️ DB Guard
    needs: [l1-verify]
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/heads/fix/')
    runs-on: [self-hosted, IronForge-Local] # Target specific local runner
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-ironforge
        with:
          tier: 'guard'
      - name: Create Shadow Database
        shell: bash
        run: |
          # Managed-services assumes DB is already healthy
          npx tsx scripts/ci/setup-db.ts
        env:
          TARGET_DB: ironforge_shadow
      - name: Verify Prisma Drift
        shell: bash
        run: |
          pnpm exec prisma -v
          SHADOW_DATABASE_URL="$SHADOW_DATABASE_URL" pnpm exec prisma migrate diff --from-migrations prisma/migrations --to-schema prisma/schema.prisma --exit-code
        # DATABASE_URL and SHADOW_DATABASE_URL are already namespaced and exported by setup-ironforge

  # E2E Smoke Tests for L2
  l2-e2e-smoke:
    name: "🎭 L2: E2E Smoke"
    needs: [l2-verification]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/fix/')
    runs-on: [self-hosted, IronForge-Local] # Target specific local runner
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-ironforge
        with:
          tier: 'l2'
      - run: npx prisma generate
      - name: Cache Playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
      - run: npx playwright install --with-deps
      - name: Run Smoke E2E
        run: |
          sleep 15
          pnpm run test:smoke
        env:
          CI: true
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000

  # Performance Audit for L2
  l2-perf-audit:
    name: "📊 L2: Perf Audit"
    needs: [l2-verification]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/fix/')
    runs-on: [self-hosted, IronForge-Local] # Target specific local runner
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-ironforge
      - run: pnpm run build
      - name: Run Lighthouse Audit
        run: pnpm run lhci
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  # DB Guard renamed to L2: DB Guard
  l2-db-guard:
    name: "🗄️ L2: DB Guard"
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/fix/')
    runs-on: [self-hosted, IronForge-Local] # Target specific local runner
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-ironforge
        with:
          tier: 'l2'
      - name: Create Shadow Database
        run: |
          sleep 15
          npx tsx scripts/ci/setup-db.ts
        env:
          TARGET_DB: ironforge_shadow
      - name: Verify Prisma Drift
        run: |
          npx prisma migrate diff --from-migrations prisma/migrations --to-schema prisma/schema.prisma --exit-code

  # Automatic Deployment Trigger (L2 Success)
  deploy-verification:
    name: 🏥 Deployment Status
    needs: [l2-verification, l2-e2e-smoke, l2-db-guard, l2-perf-audit]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/fix/')
    runs-on: [self-hosted, IronForge-Local] # Target specific local runner
    steps:
      - name: Verify Health
        env:
          DEPLOY_URL: ${{ secrets.PRODUCTION_URL || 'https://ironforge.life' }}
        run: |
          echo "🔍 Checking health at $DEPLOY_URL/api/health"
          sleep 90 # Coolify deploy buffer
          curl -f -s "$DEPLOY_URL/api/health" || exit 1
