# Sovereign Service Layer Active: Optimized for sub-second readiness
name: IronForge CI/CD

on:
  push:
    branches: [main, release, fix/*]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.agent/**'
      - '.vscode/**'
  pull_request:
    branches: [main, release, fix/*]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.agent/**'
      - '.vscode/**'
  workflow_dispatch:


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  DIRECT_URL: ${{ secrets.DIRECT_URL }}
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://dummy.supabase.co' }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'dummy' }}
  SKIP_ENV_VALIDATION: true

jobs:

  # ==================================================================
  # TIER L1: FAST FEEDBACK (PR)
  # Objective: Verify logic & syntax in < 5 minutes.
  # ==================================================================
  l1-verify:
    name: "⚡ L1: Verify"
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/heads/fix/')
    runs-on: [self-hosted, IronForge-Local] # Target specific local runner
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # Required for turbo comparison
      - uses: ./.github/actions/setup-ironforge
        with:
          tier: 'l1'
      - name: Initialize DB (L1)
        run: |
          # Managed-services assumes DB is already healthy (0s wait)
          npx prisma db push
      - name: Cache Turbo
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: .turbo
          key: turbo-l1-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            turbo-l1-${{ runner.os }}-
      - name: Turbo L1 Verify (Differential)
        run: pnpm run ci:l1

      # ==================================================================
      # ACTIVE HANDOVER: Proactive Monitoring on Success
      # ==================================================================
      - name: "✨ Active Handover: Proactive Optimization"
        if: success()
        run: |
          printf "❇️ CI Doctor: Success detected. Initiating Proactive Monitoring...\n"
          mkdir -p .agent/tasks
          
          # Check for CodeRabbit presence to trigger Optimizer
          if gh pr view --json reviews -q '.reviews[].author.login' | grep -q "coderabbit"; then
             printf "🤖 Triggering Code Optimizer...\n"
             printf "OPTIMIZE: Implement CodeRabbit suggestions in $GITHUB_SHA\n" > .agent/tasks/doctor-code-optimize.md
          fi

          # Proactive Security Check
          printf "🛡️ Triggering Security Sentinel...\n"
          printf "HARDEN: Proactive security scan for $GITHUB_SHA\n" > .agent/tasks/doctor-security-sentinel.md


      # ==================================================================
      # ACTIVE HANDOVER: Auto-Triage on Failure
      # ==================================================================
      - name: "🩺 Active Handover: Auto-Triage"
        if: failure()
        run: |
          printf "🚨 CI Doctor: Failure detected in L1. Initiating Board-Level Triage...\n"
          printf "⚠️ Extracting logs for AI diagnosis is currently disabled for cross-platform compatibility.\n"
          printf "FIX: L1 Failure in $GITHUB_SHA\n" > .agent/tasks/doctor-infra-signal.md


  # ==================================================================
  # TIER L2: FULL VERIFICATION (MERGE)
  # Objective: Comprehensive check before deployment.
  # ==================================================================
  l2-verification:
    name: "🚀 L2: Verification"
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/fix/')
    runs-on: [self-hosted, IronForge-Local] # Target specific local runner
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-ironforge
      - name: Cache Turbo L2
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: .turbo
          key: turbo-l2-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            turbo-l2-${{ runner.os }}-
      - name: Initialize DB (L2)
        run: npx prisma db push
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        continue-on-error: true
      - name: Turbo L2 verification
        run: pnpm run ci:l2

  # 🐳 DOCKER VERIFICATION
  docker-verify:
    name: "🐳 Docker: Build Verify"
    needs: l2-verification
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/fix/')
    runs-on: [self-hosted, IronForge-Local]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build Production Image
        run: |
          docker build -t ironforge-app:latest --target runner .
      - name: Verify Image
        run: |
          docker image inspect ironforge-app:latest

  # 🎭 E2E VERIFICATION
  e2e:
    name: 🎭 E2E Tests
    needs: [l1-verify]
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    runs-on: [self-hosted, IronForge-Local] # Target specific local runner
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-ironforge
        with:
          tier: 'e2e'
      - name: Cache Playwright Browsers
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps
      - name: Initialize E2E DB
        run: |
          # Managed-services assumes DB is already healthy
          npx prisma db push --force-reset
      - name: Seed E2E Database
        run: npx tsx tests/e2e/setup/e2e-seed.ts
        env:
          # DATABASE_URL is now managed by setup-ironforge to point to namespaced port
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      - name: Run Playwright Tests
        run: npx playwright test
        env:
          CI: true
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000

  # ==================================================================
  # PHASE 3: L2 (Extended Verification)
  # ==================================================================

  # E2E Smoke Tests for L2
  l2-e2e-smoke:
    name: "🎭 L2: E2E Smoke"
    needs: [l2-verification]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/fix/')
    runs-on: [self-hosted, IronForge-Local] # Target specific local runner
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-ironforge
        with:
          tier: 'l2'
      - name: Cache Playwright
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
      - run: npx playwright install --with-deps
      - name: Run Smoke E2E
        run: pnpm run test:smoke
        env:
          CI: true
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000

  # Performance Audit for L2
  l2-perf-audit:
    name: "📊 L2: Perf Audit"
    needs: [l2-verification]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/fix/')
    runs-on: [self-hosted, IronForge-Local] # Target specific local runner
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-ironforge
      - run: pnpm run build
      - name: Run Lighthouse Audit
        run: pnpm run lhci
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  # DB Guard renamed to L2: DB Guard
  l2-db-guard:
    name: "🗄️ L2: DB Guard"
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/fix/')
    runs-on: [self-hosted, IronForge-Local] # Target specific local runner
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-ironforge
        with:
          tier: 'l2'
      - name: Create Shadow Database
        shell: pwsh
        run: npx tsx scripts/ci/setup-db.ts
        env:
          TARGET_DB: ironforge_shadow
          ADMIN_DATABASE_URL: ${{ env.ADMIN_DATABASE_URL }}
      - name: Verify Prisma Drift
        shell: pwsh
        run: |
          npx prisma migrate diff --from-migrations prisma/migrations --to-schema prisma/schema.prisma --shadow-database-url $env:SHADOW_DATABASE_URL --exit-code

  # Automatic Deployment Trigger (L2 Success)
  deploy-verification:
    name: 🏥 Deployment Status
    needs: [l2-verification, l2-e2e-smoke, l2-db-guard, l2-perf-audit]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/fix/')
    runs-on: [self-hosted, IronForge-Local] # Target specific local runner
    steps:
      - name: Verify Health
        env:
          DEPLOY_URL: ${{ secrets.PRODUCTION_URL || 'https://ironforge.life' }}
        run: |
          printf "🔍 Checking health at $DEPLOY_URL/api/health\n"
          # Wait up to 90s for Coolify deployment using a loop instead of hard sleep
          for i in {1..18}; do curl -f -s "$DEPLOY_URL/api/health" && exit 0 || sleep "5"; done; exit 1
