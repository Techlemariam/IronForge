name: IronForge CI/CD

on:
  push:
    branches: [main, release]
  pull_request:
    branches: [main, release]
  workflow_dispatch:


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  DIRECT_URL: ${{ secrets.DIRECT_URL }}
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://dummy.supabase.co' }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'dummy' }}
  SKIP_ENV_VALIDATION: true

jobs:
  # ------------------------------------------------------------------
  # 🛡️ QUALITY GATE
  # Fast feedback on code standards, unit tests, and security.
  # ------------------------------------------------------------------
  # ------------------------------------------------------------------
  # ⚡ VERIFY (Lint, Test, Build, Security)
  # Runs all checks in parallel using Turborepo.
  # ------------------------------------------------------------------
  verify:
    name: ⚡ Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma Client
        run: npx prisma generate
      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-
      - name: Turbo Verify
        run: npx turbo run lint check-types test:coverage build security --concurrency=100%
        env:
          SKIP_ENV_VALIDATION: true
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  # ------------------------------------------------------------------
  # 🎭 E2E VERIFICATION
  # Simulates critical user flows.
  # ------------------------------------------------------------------
  e2e:
    name: 🎭 E2E Tests
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma Client
        run: npx prisma generate
      - name: Cache Playwright Browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps
      - name: Seed E2E Database
        run: npx tsx tests/e2e/setup/e2e-seed.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Run Playwright Tests
        run: npx playwright test
        env:
          CI: true
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

  # ------------------------------------------------------------------
  # 🗄️ DATABASE GUARD
  # Ensures Prisma schema matches migration history (No Drift).
  # ------------------------------------------------------------------
  db-guard:
    name: 🗄️ DB Guard
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ironforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Create Shadow Database
        run: |
          PGPASSWORD=password psql -h localhost -U postgres -c "CREATE DATABASE ironforge_shadow;"
      - name: Verify Prisma Drift
        run: |
          npx prisma migrate diff \
            --from-migrations prisma/migrations \
            --to-schema prisma/schema.prisma \
            --exit-code
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/ironforge_test?schema=public
          SHADOW_DATABASE_URL: postgresql://postgres:password@localhost:5432/ironforge_shadow?schema=public

  # ------------------------------------------------------------------
  # ⚡ PERFORMANCE AUDIT (Lighthouse)
  # Checks budget for Performance, Accessibility, SEO.
  # ------------------------------------------------------------------
  perf-audit:
    name: ⚡ Performance Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma Client
        run: npx prisma generate
      - name: Build Application
        run: pnpm build
        env:
          SKIP_ENV_VALIDATION: true
      - name: Run Lighthouse CI
        run: pnpm run lhci
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        continue-on-error: true # Don't block deploy initially while tuning

  # ------------------------------------------------------------------
  # 🎨 VISUAL REGRESSION (Chromatic)
  # Catches UI changes in Storybook components.
  # ------------------------------------------------------------------
  chromatic:
    name: 🎨 Chromatic
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Required for Chromatic
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run Chromatic
        uses: chromaui/action@v15
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          token: ${{ secrets.GITHUB_TOKEN }}

  # ------------------------------------------------------------------
  # 🏥 VERIFY DEPLOYMENT (Coolify Health Check)
  # Waits for Coolify auto-deployment and verifies health endpoint.
  # ------------------------------------------------------------------
  verify-deployment:
    name: 🏥 Verify Deployment
    needs: [verify, e2e, db-guard]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Coolify Deployment
        run: |
          echo "⏳ Waiting for Coolify to deploy..."
          sleep 90  # Give Coolify time to pull, build, and deploy
      
      - name: Check Health Endpoint
        env:
          DEPLOY_URL: ${{ secrets.PRODUCTION_URL || 'https://your-app.com' }}
        run: |
          echo "🔍 Checking deployment health at $DEPLOY_URL/api/health"
          for i in {1..5}; do
            if curl -f -s "$DEPLOY_URL/api/health" > /dev/null 2>&1; then
              echo "✅ Deployment healthy!"
              exit 0
            fi
            echo "Attempt $i/5 failed, retrying in 10s..."
            sleep 10
          done
          echo "❌ Deployment health check failed after 5 attempts"
          exit 1

  # ------------------------------------------------------------------
  # 📝 CREATE RELEASE (After Deployment Verification)
  # Generates a GitHub Release using Semantic Conventions.
  # Note: Deployment handled by Coolify, verified by verify-deployment job.
  # ------------------------------------------------------------------
  create-release:
    name: 📝 Create Release
    permissions:
      contents: write
    needs: [verify-deployment]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.0.${{ github.run_number }}
          name: Release v0.0.${{ github.run_number }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Append Custom Release Notes
        if: ${{ steps.create_release.outputs.url }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: v0.0.${{ github.run_number }}
        run: |
          if [ -f "RELEASE_NOTES.md" ]; then
            echo "📄 Found RELEASE_NOTES.md, appending to release..."
            # Fetch current body
            gh release view "$TAG_NAME" --json body -q .body > current_body.txt
            
            # Append custom notes
            echo -e "\n\n### 📝 Developer Notes\n" >> current_body.txt
            cat RELEASE_NOTES.md >> current_body.txt
            
            # Update release
            gh release edit "$TAG_NAME" --notes-file current_body.txt
          else
            echo "ℹ️ No RELEASE_NOTES.md found."
          fi



