name: IronForge CI/CD

on:
  push:
    branches: [main, release]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.agent/**'
      - '.vscode/**'
  pull_request:
    branches: [main, release]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.agent/**'
      - '.vscode/**'
  workflow_dispatch:


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  DIRECT_URL: ${{ secrets.DIRECT_URL }}
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://dummy.supabase.co' }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'dummy' }}
  SKIP_ENV_VALIDATION: true

jobs:
  # ==================================================================
  # PRE-FLIGHT: VALIDATE SECRETS
  # ==================================================================
  pre-flight:
    name: "🚀 Pre-flight"
    runs-on: windows-latest # Using Windows for PowerShell Core consistency with local dev
    steps:
      - uses: actions/checkout@v4
      - name: Validate Critical Secrets
        shell: pwsh
        run: .\scripts\ci\validate-secrets.ps1
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  # ==================================================================
  # TIER L1: FAST FEEDBACK (PR)
  # Objective: Verify logic & syntax in < 5 minutes.
  # ==================================================================
  l1-verify:
    name: "⚡ L1: Verify"
    needs: pre-flight
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ironforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for turbo comparison
      - uses: ./.github/actions/setup-ironforge
      - name: Generate Prisma Client
        run: npx prisma generate
      - name: Initialize DB (L1)
        run: |
          sleep 15
          npx prisma db push
        env:
          DATABASE_URL: postgresql://postgres:password@127.0.0.1:5432/ironforge_test?schema=public
      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-l1-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-l1-${{ runner.os }}-
      - name: Turbo L1 Verify (Differential)
        run: pnpm run ci:l1
        env:
          DATABASE_URL: postgresql://postgres:password@127.0.0.1:5432/ironforge_test?schema=public

  # ==================================================================
  # TIER L2: FULL VERIFICATION (MERGE)
  # Objective: Comprehensive check before deployment.
  # ==================================================================
  l2-verification:
    name: "🚀 L2: Verification"
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ironforge_full
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-ironforge
      - run: npx prisma generate
      - name: Cache Turbo L2
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-l2-${{ runner.os }}-${{ github.sha }}
      - name: Turbo L2 verification
        run: pnpm run ci:l2
        env:
          DATABASE_URL: postgresql://postgres:password@127.0.0.1:5432/ironforge_full?schema=public

  # 🎭 E2E VERIFICATION
  e2e:
    name: 🎭 E2E Tests
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ironforge_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-ironforge
      - name: Generate Prisma Client
        run: npx prisma generate
      - name: Cache Playwright Browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps
      - name: Initialize E2E DB
        run: |
          sleep 30
          npx prisma db push --force-reset
        env:
          DATABASE_URL: postgresql://postgres:password@127.0.0.1:5432/ironforge_e2e?schema=public
      - name: Seed E2E Database
        run: npx tsx tests/e2e/setup/e2e-seed.ts
        env:
          DATABASE_URL: postgresql://postgres:password@127.0.0.1:5432/ironforge_e2e?schema=public
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      - name: Run Playwright Tests
        run: npx playwright test
        env:
          CI: true
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          DATABASE_URL: postgresql://postgres:password@localhost:5432/ironforge_e2e?schema=public

  # 🗄️ DATABASE GUARD
  db-guard:
    name: 🗄️ DB Guard
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ironforge_test
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-ironforge
      - name: Create Shadow Database
        run: |
          PGPASSWORD=password psql -h 127.0.0.1 -U postgres -c "CREATE DATABASE ironforge_shadow;"
      - name: Verify Prisma Drift
        run: |
          npx prisma migrate diff \
            --from-migrations prisma/migrations \
            --to-schema prisma/schema.prisma \
            --exit-code
        env:
          DATABASE_URL: postgresql://postgres:password@127.0.0.1:5432/ironforge_test?schema=public
          SHADOW_DATABASE_URL: postgresql://postgres:password@127.0.0.1:5432/ironforge_shadow?schema=public

  # E2E Smoke Tests for L2
  l2-e2e-smoke:
    name: "🎭 L2: E2E Smoke"
    needs: [l2-verification]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ironforge_e2e
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: npx prisma generate
      - name: Cache Playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
      - run: npx playwright install --with-deps
      - name: Run Smoke E2E
        run: pnpm run test:smoke
        env:
          CI: true
          DATABASE_URL: postgresql://postgres:password@127.0.0.1:5432/ironforge_e2e?schema=public
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000

  # Performance Audit for L2
  l2-perf-audit:
    name: "📊 L2: Perf Audit"
    needs: [l2-verification]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Run Lighthouse Audit
        run: pnpm run lhci
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  # DB Guard renamed to L2: DB Guard
  l2-db-guard:
    name: "🗄️ L2: DB Guard"
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ironforge_test
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Verify Prisma Drift
        run: |
          npx prisma migrate diff --from-migrations prisma/migrations --to-schema prisma/schema.prisma --exit-code
        env:
          DATABASE_URL: postgresql://postgres:password@127.0.0.1:5432/ironforge_test?schema=public

  # Automatic Deployment Trigger (L2 Success)
  deploy-verification:
    name: 🏥 Deployment Status
    needs: [l2-verification, l2-e2e-smoke, l2-db-guard, l2-perf-audit]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Verify Health
        env:
          DEPLOY_URL: ${{ secrets.PRODUCTION_URL || 'https://ironforge.life' }}
        run: |
          echo "🔍 Checking health at $DEPLOY_URL/api/health"
          sleep 90 # Coolify deploy buffer
          curl -f -s "$DEPLOY_URL/api/health" || exit 1



