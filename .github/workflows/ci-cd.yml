name: IronForge CI/CD

on:
  push:
    branches: [main, release]
  pull_request:
    branches: [main, release]
  workflow_dispatch:
    inputs:
      fix_drift:
        description: 'Run prisma migrate dev to fix schema drift'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  DIRECT_URL: ${{ secrets.DIRECT_URL }}
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://dummy.supabase.co' }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'dummy' }}
  SKIP_ENV_VALIDATION: true

jobs:
  # ------------------------------------------------------------------
  # ⚡ VERIFY (Lint, Test, Build, Security)
  # Runs all checks in parallel using Turborepo.
  # ------------------------------------------------------------------
  verify:
    name: ⚡ Verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ironforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Pipeline
        uses: ./.github/actions/setup-pipeline
        with:
          node-version: '22'

      - name: Initialize DB
        run: |
          until pg_isready -h 127.0.0.1 -U postgres; do sleep 1; done
          npx prisma db push --force-reset
        env:
          DATABASE_URL: postgresql://postgres:password@127.0.0.1:5432/ironforge?schema=public
          DIRECT_URL: postgresql://postgres:password@127.0.0.1:5432/ironforge?schema=public

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-

      - name: Verify All (Lint, Types, Test, Build, Security)
        run: npx turbo run lint check-types test build security --concurrency=100%
        env:
          DATABASE_URL: postgresql://postgres:password@127.0.0.1:5432/ironforge?schema=public
          DIRECT_URL: postgresql://postgres:password@127.0.0.1:5432/ironforge?schema=public
          PRISMA_CLI_SKIP_INTERACTIVE: true

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  # ------------------------------------------------------------------
  # 🎭 E2E VERIFICATION
  # Simulates critical user flows.
  # ------------------------------------------------------------------
  e2e:
    name: 🎭 E2E Tests
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ironforge_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Pipeline
        uses: ./.github/actions/setup-pipeline
        with:
          node-version: '22'

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
      
      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Push Schema to E2E DB
        run: |
          until pg_isready -h 127.0.0.1 -U postgres; do sleep 1; done
          npx prisma db push --force-reset
        env:
          DATABASE_URL: postgresql://postgres:password@127.0.0.1:5432/ironforge_e2e?schema=public
          DIRECT_URL: postgresql://postgres:password@127.0.0.1:5432/ironforge_e2e?schema=public
          PRISMA_CLI_SKIP_INTERACTIVE: true

      - name: Seed E2E Database
        run: npx tsx tests/e2e/setup/e2e-seed.ts
        env:
          DATABASE_URL: postgresql://postgres:password@127.0.0.1:5432/ironforge_e2e?schema=public

      - name: Run Playwright Tests
        run: npx playwright test
        env:
          CI: true
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          DATABASE_URL: postgresql://postgres:password@127.0.0.1:5432/ironforge_e2e?schema=public
          DIRECT_URL: postgresql://postgres:password@127.0.0.1:5432/ironforge_e2e?schema=public

  # ------------------------------------------------------------------
  # 🗄️ DATABASE GUARD
  # Ensures Prisma schema matches migration history (No Drift).
  # ------------------------------------------------------------------
  db-guard:
    name: 🗄️ DB Guard
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ironforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
      
      - name: Setup Pipeline
        uses: ./.github/actions/setup-pipeline
        with:
          node-version: '22'

      - name: Create Shadow Database
        run: |
          until pg_isready -h 127.0.0.1 -U postgres; do sleep 1; done
          PGPASSWORD=password psql -h 127.0.0.1 -U postgres -c "CREATE DATABASE ironforge_shadow;"

      - name: Fix Drift (Conditioned)
        if: ${{ github.event.inputs.fix_drift == 'true' || inputs.fix_drift == true || inputs.fix_drift == 'true' }}
        run: |
           git config --global user.name 'CI Bot'
           git config --global user.email 'ci@ironforge.gg'
           
           # Generate migration using diff (non-interactive safe)
           MIGRATION_NAME="$(date +%Y%m%d%H%M%S)_fix_ci_drift"
           mkdir -p prisma/migrations/$MIGRATION_NAME
           
           npx prisma migrate diff \
             --from-migrations prisma/migrations \
             --to-schema prisma/schema.prisma \
             --shadow-database-url "${{ env.SHADOW_DATABASE_URL }}" \
             --script > prisma/migrations/$MIGRATION_NAME/migration.sql
           
           if [ -s prisma/migrations/$MIGRATION_NAME/migration.sql ]; then
             echo "Generated migration SQL:"
             cat prisma/migrations/$MIGRATION_NAME/migration.sql
             git add prisma/migrations
             git commit -m "chore: fix migrations via CI [skip ci]"
             git push
           else
             echo "No migration generated."
             rm -rf prisma/migrations/$MIGRATION_NAME
           fi
        env:
           DATABASE_URL: postgresql://postgres:password@127.0.0.1:5432/ironforge_test?schema=public
           SHADOW_DATABASE_URL: postgresql://postgres:password@127.0.0.1:5432/ironforge_shadow?schema=public
           PRISMA_CLI_SKIP_INTERACTIVE: true
      
      - name: Verify Prisma Drift
        if: ${{ inputs.fix_drift != true }}
        run: |
          npx prisma migrate diff \
            --from-migrations prisma/migrations \
            --to-schema prisma/schema.prisma \
            --exit-code
        env:
          DATABASE_URL: postgresql://postgres:password@127.0.0.1:5432/ironforge_test?schema=public
          SHADOW_DATABASE_URL: postgresql://postgres:password@127.0.0.1:5432/ironforge_shadow?schema=public
          PRISMA_CLI_SKIP_INTERACTIVE: true

  # ------------------------------------------------------------------
  # ⚡ PERFORMANCE AUDIT (Lighthouse)
  # Checks budget for Performance, Accessibility, SEO.
  # ------------------------------------------------------------------
  perf-audit:
    name: ⚡ Performance Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Pipeline
        uses: ./.github/actions/setup-pipeline
        with:
          node-version: '22'

      - name: Build Application
        run: pnpm build
        env:
          SKIP_ENV_VALIDATION: true

      - name: Run Lighthouse CI
        run: pnpm run lhci
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        continue-on-error: true

  # ------------------------------------------------------------------
  # 🎨 CHROMATIC
  # Visual regression testing.
  # ------------------------------------------------------------------
  chromatic:
    name: 🎨 Chromatic
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 
      
      - name: Setup Pipeline
        uses: ./.github/actions/setup-pipeline
        with:
          node-version: '22'

      - name: Run Chromatic
        uses: chromaui/action@v11
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          token: ${{ secrets.GITHUB_TOKEN }}

  # ------------------------------------------------------------------
  # 🏥 VERIFY DEPLOYMENT (Coolify Health Check)
  # Waits for Coolify auto-deployment and verifies health endpoint.
  # ------------------------------------------------------------------
  verify-deployment:
    name: 🏥 Verify Deployment
    needs: [verify, e2e, db-guard]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Wait for Coolify Deployment
        run: |
          echo "⏳ Waiting for Coolify to deploy..."
          sleep 90
      
      - name: Check Health Endpoint
        env:
          # Use add-mask to safely handle secret URL if it's sensitive
          DEPLOY_URL: ${{ secrets.PRODUCTION_URL || 'https://your-app.com' }}
        run: |
          echo "::add-mask::$DEPLOY_URL"
          echo "🔍 Checking deployment health..."
          for i in {1..5}; do
            if curl -f -s "$DEPLOY_URL/api/health" > /dev/null 2>&1; then
              echo "✅ Deployment healthy!"
              exit 0
            fi
            echo "Attempt $i/5 failed, retrying in 10s..."
            sleep 10
          done
          echo "❌ Deployment health check failed after 5 attempts"
          exit 1

  # ------------------------------------------------------------------
  # 📝 CREATE RELEASE (After Deployment Verification)
  # Generates a GitHub Release using Semantic Conventions.
  # ------------------------------------------------------------------
  create-release:
    name: 📝 Create Release
    permissions:
      contents: write
    needs: [verify-deployment]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 10
    steps:
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.0.${{ github.run_number }}
          name: Release v0.0.${{ github.run_number }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Append Custom Release Notes
        if: ${{ steps.create_release.outputs.url }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: v0.0.${{ github.run_number }}
        run: |
          if [ -f "RELEASE_NOTES.md" ]; then
            echo "📄 Found RELEASE_NOTES.md, appending to release..."
            gh release view "$TAG_NAME" --json body -q .body > current_body.txt
            echo -e "\n\n### 📝 Developer Notes\n" >> current_body.txt
            cat RELEASE_NOTES.md >> current_body.txt
            gh release edit "$TAG_NAME" --notes-file current_body.txt
          else
            echo "ℹ️ No RELEASE_NOTES.md found."
          fi
