name: "🛡️ Governance Guard"

on:
  pull_request:
    paths:
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  audit-workflows:
    name: Audit Workflow Standards
    runs-on: [self-hosted, IronForge-Local]
    steps:
      - uses: actions/checkout@v4

      - name: Check Node and pnpm Versions
        shell: bash
        run: |
          echo "### 🛡️ Workflow Governance Audit" >> $GITHUB_STEP_SUMMARY
          ERRORS=0

          for file in .github/workflows/*.yml; do
            # Skip itself
            if [[ "$file" == *"/governance-guard.yml" ]]; then continue; fi

            echo "Auditing $file..."
            
            # Check for Node 22
            # We check for '22' or "22" or version used in the composite action
            if ! grep -qE "node-version: ['\"]?22['\"]?|setup-ironforge" "$file"; then
              echo "❌ $file: Missing Node 22 standardization" >> $GITHUB_STEP_SUMMARY
              ERRORS=$((ERRORS + 1))
            fi

            # Check for pnpm 9
            if ! grep -qE "version: ['\"]?9['\"]?|setup-ironforge" "$file"; then
              # Some workflows might not use pnpm (governance only), so we check if setup-pnpm is used at all
              if grep -q "pnpm/action-setup" "$file"; then
                echo "❌ $file: Uses pnpm but not version 9" >> $GITHUB_STEP_SUMMARY
                ERRORS=$((ERRORS + 1))
              fi
            fi

            # Check for checkout@v4
            if grep -q "actions/checkout@v" "$file" && ! grep -q "actions/checkout@v4" "$file"; then
              echo "❌ $file: Uses outdated checkout action (use @v4)" >> $GITHUB_STEP_SUMMARY
              ERRORS=$((ERRORS + 1))
            fi
          done

          if [ $ERRORS -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ Found $ERRORS governance violations. Please fix them to match IronForge standards." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ All workflows meet Titan-Tier standards." >> $GITHUB_STEP_SUMMARY
          fi
