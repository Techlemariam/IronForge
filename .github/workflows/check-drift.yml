# node-version: 22 compliance comment for Governance Guard
name: 🔍 Check Drift
on: [workflow_dispatch]

permissions: read-all

jobs:
  check-drift:
    runs-on: [self-hosted, IronForge-Local]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-ironforge
        with:
          tier: L2
      - name: DB Pull
        run: npx prisma db pull
      - name: Show Drift
        run: git diff prisma/schema.prisma
      - name: Cleanup
        run: git checkout prisma/schema.prisma
