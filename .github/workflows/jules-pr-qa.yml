# node-version: 22 compliance comment for Governance Guard
name: 🤖 Jules PR Auto-QA

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: [main, develop]

concurrency:
  group: jules-qa-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

env:
  NODE_VERSION: "22"

jobs:
  detect-jules:
    name: 🔍 Detect Jules PR
    runs-on: ubuntu-latest
    outputs:
      is_jules: ${{ steps.check.outputs.is_jules }}
    steps:
      - name: Check if Jules PR
        id: check
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [[ "$HEAD_REF" == jules/* ]]; then
            echo "is_jules=true" >> $GITHUB_OUTPUT
            echo "✅ Jules PR detected: $HEAD_REF"
          else
            echo "is_jules=false" >> $GITHUB_OUTPUT
            echo "⏭️ Not a Jules PR, skipping"
          fi

  qa-gate:
    name: 🧪 Jules QA Gate
    needs: detect-jules
    if: needs.detect-jules.outputs.is_jules == 'true'
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup IronForge
        uses: ./.github/actions/setup-ironforge

      - name: 🔒 Scope Guard — Verify Jules stayed in bounds
        run: |
          echo "## 🔒 Scope Guard" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Get list of changed files
          CHANGED=$(git diff --name-only origin/main...HEAD)

          # Forbidden patterns for Jules
          FORBIDDEN_PATTERNS=(
            "prisma/migrations"
            ".github/workflows"
            "src/lib/auth"
            "src/app/api/auth"
            "docker-compose"
            "Dockerfile"
            ".env"
            "secrets"
          )

          VIOLATIONS=""
          for pattern in "${FORBIDDEN_PATTERNS[@]}"; do
            MATCHES=$(echo "$CHANGED" | grep -i "$pattern" || true)
            if [ -n "$MATCHES" ]; then
              VIOLATIONS="$VIOLATIONS\n- ❌ \`$pattern\`: $MATCHES"
            fi
          done

          if [ -n "$VIOLATIONS" ]; then
            echo "### ❌ Scope Violations Found" >> $GITHUB_STEP_SUMMARY
            echo -e "$VIOLATIONS" >> $GITHUB_STEP_SUMMARY
            echo ""
            echo "::error::Jules modified forbidden files. Manual review required."
            exit 1
          else
            echo "### ✅ All changes within allowed scope" >> $GITHUB_STEP_SUMMARY
          fi

          # File count check
          FILE_COUNT=$(echo "$CHANGED" | wc -l)
          if [ "$FILE_COUNT" -gt 10 ]; then
            echo "::warning::Jules modified $FILE_COUNT files (threshold: 10). Review carefully."
            echo "- ⚠️ $FILE_COUNT files modified (threshold: 10)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ✅ $FILE_COUNT files modified (within threshold)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 🧹 Lint Check
        run: npm run lint -- --max-warnings 0
        continue-on-error: true

      - name: 🔍 Type Check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: 🧪 Run Tests
        run: npm test -- --passWithNoTests --ci
        continue-on-error: true

      - name: 📋 QA Summary
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const branch = context.payload.pull_request.head.ref;
            const taskId = branch.replace('jules/', '').split('-').slice(0, 2).join('-');

            const body = [
              '## 🤖 Jules Auto-QA Report',
              '',
              `| Check | Status |`,
              `|:------|:-------|`,
              `| Scope Guard | ${{ steps.*.outcome == 'failure' && '❌ Failed' || '✅ Passed' }} |`,
              `| Lint | ${{ job.status }} |`,
              `| Types | ${{ job.status }} |`,
              `| Tests | ${{ job.status }} |`,
              '',
              `> Task: \`${taskId}\` — Branch: \`${branch}\``,
              '',
              '*This PR was created by Jules and auto-validated by the QA pipeline.*',
            ].join('\n');

            await github.rest.issues.createComment({
              owner, repo, issue_number: prNumber, body
            });

  label-jules-pr:
    name: 🏷️ Label Jules PR
    needs: detect-jules
    if: needs.detect-jules.outputs.is_jules == 'true'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Add Jules labels
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;

            // Ensure labels exist
            const labels = ['🤖 jules', 'auto-qa'];
            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label });
              } catch {
                await github.rest.issues.createLabel({
                  owner, repo, name: label,
                  color: label === '🤖 jules' ? '7c3aed' : '0ea5e9',
                  description: label === '🤖 jules'
                    ? 'PR created by Jules autonomous worker'
                    : 'Automatically QA validated'
                });
              }
            }

            await github.rest.issues.addLabels({
              owner, repo, issue_number: prNumber, labels
            });
