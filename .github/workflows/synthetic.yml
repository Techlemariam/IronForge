name: 🌐 Synthetic Monitoring
on:
  schedule:
    - cron: '0 * * * *' # Run every hour
  workflow_dispatch:

jobs:
  synthetic-check:
    name: 🏥 Prod Health Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Synthetic Test
        env:
          # Use production URL from secrets, or default to main site
          BASE_URL: ${{ secrets.PRODUCTION_URL || 'https://ironforge.gg' }}
          CI: true
        run: |
          echo "Running synthetic check against $BASE_URL"
          # Run specifically the landing page test or a dedicated synthetic spec
          # Overriding the baseURL in playwright config via env var or CLI arg would be ideal,
          # but for now we assume the test can adapt or we just check basic reachability.
          
          # Creating a temporary synthetic test on the fly if one doesn't exist designed for prod
          echo "import { test, expect } from '@playwright/test';
          
          test('Synthetic Health Check', async ({ page }) => {
            const response = await page.goto('$BASE_URL');
            expect(response.status()).toBe(200);
            await expect(page).toHaveTitle(/IronForge/i);
          });" > tests/e2e/synthetic.spec.ts

          npx playwright test tests/e2e/synthetic.spec.ts --project=chromium
        
      - name: 🚨 Notify on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Synthetic Monitor Failed',
              body: `The hourly synthetic health check failed against production.\n\n[View Run Log](${runUrl})`,
              labels: ['critical', 'ops']
            });
