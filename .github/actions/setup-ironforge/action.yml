name: 'Setup IronForge'
description: 'Standardized Environment Setup (Node 22, pnpm 9, Caching)'
inputs:
  node-version:
    description: 'Node.js version'
    required: false
    default: '22'
  pnpm-version:
    description: 'pnpm version'
    required: false
    default: '9.15.0'
  cache:
    description: 'Cache provider'
    required: false
    default: 'pnpm'
  skip-validation:
    description: 'Skip secret validation'
    required: false
    default: 'false'
  tier:
    description: 'CI Tier (l1, e2e, guard, l3)'
    required: false
    default: 'l1'

runs:
  using: "composite"
  steps:
    - name: Managed-Services Detection
      shell: pwsh
      run: |
        $Tier = "${{ inputs.tier }}"
        Write-Host "🔍 Detecting Managed Service for tier: $Tier" -ForegroundColor Cyan
        
        $ContainerName = "ironforge-pg-$Tier"
        $ContainerId = docker ps -q -f "name=$ContainerName"
        
        if ($null -ne $ContainerId -and $ContainerId.Length -gt 0) {
          Write-Host "🟢 Found Managed Service: $ContainerName (ID: $ContainerId)" -ForegroundColor Green
          
          # Map Ports based on Tier
          $PortMap = @{
            "l1"    = "5433"
            "e2e"   = "5434"
            "guard" = "5435"
            "l3"    = "5436"
          }
          
          $Port = $PortMap[$Tier]
          if ($null -eq $Port) {
             Write-Error "❌ Invalid tier specified: $Tier"
             exit 1
          }

          # Detect if running in a container
          $HostAddr = "127.0.0.1"
          if (Test-Path /.dockerenv -Or (Get-Item -Path "Env:DOCKER_CONTAINER" -ErrorAction SilentlyContinue)) {
              $HostAddr = "host.docker.internal"
              Write-Host "📦 Containerized environment detected. Using host.docker.internal" -ForegroundColor Yellow
          }

          $TargetURL = "postgresql://postgres:password@$HostAddr:$Port/ironforge_test?schema=public"
          
          if ($Tier -eq "e2e") {
             $TargetURL = "postgresql://postgres:password@$HostAddr:$Port/ironforge_e2e?schema=public"
          }
          
          "DATABASE_URL=$TargetURL" | Out-File -FilePath "$env:GITHUB_ENV" -Append -Encoding utf8
          Write-Host "🚀 Exported DATABASE_URL to GITHUB_ENV (Host: $HostAddr, Port $Port)" -ForegroundColor Cyan
        } else {
          Write-Host "⚠️ Managed Service '$ContainerName' not found. Falling back to persistent env or ephemeral container." -ForegroundColor Yellow
          # Ensure DATABASE_URL is initialized if not present
          if ($null -eq $env:DATABASE_URL) {
             Write-Host "💡 Initializing DATABASE_URL fallback" -ForegroundColor Gray
          }
        }

    - name: Validate Secrets (Fast-Track)
      if: inputs.skip-validation != 'true'
      shell: pwsh
      run: .\scripts\ci\validate-secrets.ps1
      env:
        DATABASE_URL: ${{ env.DATABASE_URL }}
        NEXT_PUBLIC_SUPABASE_URL: ${{ env.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: ${{ inputs.pnpm-version }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: ${{ inputs.cache }}

    - name: Install Dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
