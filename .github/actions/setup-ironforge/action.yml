name: 'Setup IronForge'
description: 'Standardized Environment Setup (Node 22, pnpm 9, Caching)'
inputs:
  node-version:
    description: 'Node.js version'
    required: false
    default: '22'
  pnpm-version:
    description: 'pnpm version'
    required: false
    default: '9.15.0'
  cache:
    description: 'Cache provider'
    required: false
    default: 'pnpm'

runs:
  using: "composite"
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: ${{ inputs.pnpm-version }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: ${{ inputs.cache }}

    - name: Install Dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
