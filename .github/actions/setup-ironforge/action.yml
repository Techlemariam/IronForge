name: 'Setup IronForge'
description: 'Standardized Environment Setup (Node 22, pnpm 10, Caching)'
inputs:
  node-version:
    description: 'Node.js version'
    required: false
    default: '22'
  pnpm-version:
    description: 'pnpm version'
    required: false
    default: '10.30.3'
  cache:
    description: 'Cache provider'
    required: false
    default: 'pnpm'
  skip-validation:
    description: 'Skip secret validation'
    required: false
    default: 'false'
  tier:
    description: 'CI Tier (l1, e2e, guard, l3)'
    required: false
    default: 'l1'
  skip-managed-services:
    description: 'Skip Managed Services (Docker) detection'
    required: false
    default: 'false'

runs:
  using: "composite"
  steps:
    - name: Managed-Services Detection
      shell: pwsh
      run: |
        if ("${{ inputs.skip-managed-services }}" -eq "true") {
          Write-Host "⏭️ Skipping Managed Services detection as requested."
          exit 0
        }

        if (docker ps -q -f name=ironforge-pg-${{ inputs.tier }}) {
          Write-Host "🟢 Found Managed Service: ironforge-pg-${{ inputs.tier }}" -ForegroundColor Green
          
          # Map Ports based on Tier
          $PortMap = @{
            "l1"    = "5433"
            "l2"    = "5437"
            "e2e"   = "5434"
            "guard" = "5435"
            "l3"    = "5436"
          }
          
          $Port = $PortMap["${{ inputs.tier }}"]
          $DockerHost = "127.0.0.1"
          if ("${{ runner.os }}" -eq "Linux") {
            # 1. Try host.docker.internal (standard for Docker Desktop / some CI setups)
            try { 
              [System.Net.Dns]::GetHostEntry("host.docker.internal") | Out-Null
              $DockerHost = "host.docker.internal" 
              Write-Host "🌐 Using host.docker.internal as DockerHost" -ForegroundColor Gray
            } catch { 
              # 2. Try to get the gateway IP from ip route (standard for Linux containers)
              try {
                $Gateway = (ip route show | Select-String "default via (\d+\.\d+\.\d+\.\d+)").Matches.Groups[1].Value
                if ($Gateway) {
                  $DockerHost = $Gateway
                  Write-Host "🌐 Using Gateway IP ($DockerHost) as DockerHost" -ForegroundColor Gray
                }
              } catch {
                $DockerHost = "127.0.0.1"
                Write-Host "🌐 Falling back to 127.0.0.1 as DockerHost" -ForegroundColor Gray
              }
            }
          } elseif ("${{ runner.os }}" -eq "Windows") {
             # On Windows runners, if running in a container, host.docker.internal might work
             try { 
               [System.Net.Dns]::GetHostEntry("host.docker.internal") | Out-Null
               $DockerHost = "host.docker.internal"
               Write-Host "🌐 Using host.docker.internal as DockerHost (Windows)" -ForegroundColor Gray
             } catch {
               $DockerHost = "127.0.0.1"
             }
          }
          $BaseURL = "postgresql://postgres:password@${DockerHost}:$Port"
          if ("${{ inputs.tier }}" -eq "e2e") { $idb = "ironforge_e2e" } else { $idb = "ironforge_test" }
          $TargetURL = "$($BaseURL)/$($idb)?schema=public"
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "DATABASE_URL=$TargetURL`n")
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "DIRECT_URL=$TargetURL`n")
          
          # Export Admin URL for maintenance tasks (always points to 'postgres' system DB)
          $AdminURL = "$BaseURL/postgres?schema=public"
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "ADMIN_DATABASE_URL=$AdminURL`n")
          
          if ("${{ inputs.tier }}" -eq "guard" -or "${{ inputs.tier }}" -eq "l2") {
            $UniqueId = if ("${{ github.event.pull_request.number }}") { "pr_${{ github.event.pull_request.number }}" } else { "run_${{ github.run_id }}" }
            $ShadowDB = "ironforge_shadow_$UniqueId"
            $ShadowURL = "$($BaseURL)/$($ShadowDB)?schema=public"
            [System.IO.File]::AppendAllText($env:GITHUB_ENV, "SHADOW_DATABASE_URL=$ShadowURL`n")
            [System.IO.File]::AppendAllText($env:GITHUB_ENV, "TARGET_DB=$ShadowDB`n")
            Write-Host "🚀 Exported SHADOW_DATABASE_URL and TARGET_DB ($ShadowDB) to GITHUB_ENV" -ForegroundColor Cyan
          }
          
          # Rewrite local Supabase URL to use DockerHost if applicable
          $SupabaseURL = $env:NEXT_PUBLIC_SUPABASE_URL
          if ($SupabaseURL -and ($SupabaseURL -match "127.0.0.1" -or $SupabaseURL -match "localhost")) {
            $FixedSupabaseURL = $SupabaseURL -replace "127.0.0.1", $DockerHost -replace "localhost", $DockerHost
            [System.IO.File]::AppendAllText($env:GITHUB_ENV, "NEXT_PUBLIC_SUPABASE_URL=$FixedSupabaseURL`n")
            Write-Host "🔄 Rewrote NEXT_PUBLIC_SUPABASE_URL to $FixedSupabaseURL" -ForegroundColor Cyan
          }
          
          Write-Host "🚀 Exported DATABASE_URL and ADMIN_DATABASE_URL (Port $Port)" -ForegroundColor Cyan
        } else {
          Write-Error "❌ Managed Service not found for tier: ${{ inputs.tier }}. Cannot set DATABASE_URL. Aborting."
          exit 1
        }

    - name: Validate Secrets (Fast-Track)
      if: inputs.skip-validation != 'true'
      shell: pwsh
      run: .\scripts\ci\validate-secrets.ps1
      env:
        DATABASE_URL: ${{ env.DATABASE_URL }}
        NEXT_PUBLIC_SUPABASE_URL: ${{ env.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: ${{ inputs.pnpm-version }}
        dest: ${{ runner.temp }}/setup-pnpm

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        # cache: ${{ inputs.cache }}

    - name: Install Dependencies
      shell: ${{ runner.os == 'Windows' && 'pwsh' || 'bash' }}
      run: pnpm install --frozen-lockfile

    - name: Generate Prisma Client (Centralized)
      shell: ${{ runner.os == 'Windows' && 'pwsh' || 'bash' }}
      run: npx prisma generate
