name: 'Setup IronForge'
description: 'Standardized Environment Setup (Node 22, pnpm 10, Caching)'
inputs:
  node-version:
    description: 'Node.js version'
    required: false
    default: '22'
  pnpm-version:
    description: 'pnpm version'
    required: false
    default: '10.30.3'
  cache:
    description: 'Cache provider'
    required: false
    default: 'pnpm'
  skip-validation:
    description: 'Skip secret validation'
    required: false
    default: 'false'
  tier:
    description: 'CI Tier (l1, e2e, guard, l3)'
    required: false
    default: 'l1'

runs:
  using: "composite"
  steps:
    - name: Managed-Services Detection
      shell: pwsh
      run: |
        $PortMap = @{
          "l1"    = "5433"
          "l2"    = "5437"
          "e2e"   = "5434"
          "guard" = "5435"
          "l3"    = "5436"
        }
        
        $Port = $PortMap["${{ inputs.tier }}"]
        $DBName = if ("${{ inputs.tier }}" -eq "e2e") { "ironforge_e2e" } else { "ironforge_test" }
        if ("${{ inputs.tier }}" -eq "guard" -or "${{ inputs.tier }}" -eq "l2") {
          $DBName = "ironforge_shadow_run_${{ github.run_id }}"
        }

        $Tier = "${{ inputs.tier }}"
        if (!(docker ps -q -f name="ironforge-pg-$Tier")) {
          Write-Host "⚠️ Managed Service not found for tier: $Tier. Booting ephemeral PostgreSQL container..." -ForegroundColor Yellow
          
          # We're running in a Rootless Docker environment (GitHub Runner on Coolify).
          # Directly provision the test container inside the isolated workspace.
          $composeContent = "services:`n  db-$Tier:`n    image: postgres:15-alpine`n    container_name: ironforge-pg-$Tier`n    environment:`n      POSTGRES_PASSWORD: password`n      POSTGRES_DB: $DBName`n    ports:`n      - \`"$Port:5432\`""
          Set-Content -Path "docker-compose-ephemeral.yml" -Value $composeContent
          docker compose -f docker-compose-ephemeral.yml up -d
          Start-Sleep -Seconds 5
        }
        
        if (docker ps -q -f name="ironforge-pg-$Tier") {
          Write-Host "🟢 Found Managed Service: ironforge-pg-$Tier" -ForegroundColor Green
          
          $DockerHost = if ("${{ runner.os }}" -eq "Windows") { "127.0.0.1" } else { "host.docker.internal" }
          # For Docker-in-Docker isolated namespaces, fallback to localhost if host.docker.internal fails.
          if ("${{ runner.os }}" -ne "Windows") { $DockerHost = "localhost" }
          
          $BaseURL = "postgresql://postgres:password@${DockerHost}:$Port"
          $TargetURL = "$($BaseURL)/$($DBName)?schema=public"
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "DATABASE_URL=$TargetURL`n")
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "DIRECT_URL=$TargetURL`n")
          
          # Export Admin URL for maintenance tasks (always points to 'postgres' system DB)
          $AdminURL = "$BaseURL/postgres?schema=public"
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "ADMIN_DATABASE_URL=$AdminURL`n")
          
          Write-Host "🚀 Exported DATABASE_URL ($TargetURL) and ADMIN_DATABASE_URL (Port $Port)" -ForegroundColor Cyan
        } else {
          Write-Host "❌ CRITICAL: Failed to boot Ephemeral Service for tier: ${{ inputs.tier }}." -ForegroundColor Red
          exit 1
        }


    - name: Validate Secrets (Fast-Track)
      if: inputs.skip-validation != 'true'
      shell: pwsh
      run: .\scripts\ci\validate-secrets.ps1
      env:
        DATABASE_URL: ${{ env.DATABASE_URL }}
        NEXT_PUBLIC_SUPABASE_URL: ${{ env.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    - name: Setup pnpm
      uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4
      with:
        version: ${{ inputs.pnpm-version }}
        dest: ${{ runner.temp }}/setup-pnpm

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: ${{ inputs.cache }}

    - name: Install Dependencies
      shell: ${{ runner.os == 'Windows' && 'pwsh' || 'bash' }}
      run: pnpm install --frozen-lockfile

    - name: Generate Prisma Client (Centralized)
      shell: ${{ runner.os == 'Windows' && 'pwsh' || 'bash' }}
      run: npx prisma generate
