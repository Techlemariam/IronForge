name: 'Setup IronForge'
description: 'Standardized Environment Setup (Node 22, pnpm 10, Caching)'
inputs:
  node-version:
    description: 'Node.js version'
    required: false
    default: '22'
  pnpm-version:
    description: 'pnpm version'
    required: false
    default: '10.30.3'
  cache:
    description: 'Cache provider'
    required: false
    default: 'pnpm'
  skip-validation:
    description: 'Skip secret validation'
    required: false
    default: 'false'
  tier:
    description: 'CI Tier (l1, e2e, guard, l3)'
    required: false
    default: 'l1'

runs:
  using: "composite"
  steps:
    - name: Managed-Services Detection
      shell: pwsh
      run: |
        if (!(docker ps -q -f name=ironforge-pg-${{ inputs.tier }})) {
          Write-Host "⚠️ Managed Service not found for tier: ${{ inputs.tier }}. Booting ephemeral service via docker-compose.test.yml..." -ForegroundColor Yellow
          docker compose -f docker-compose.test.yml up -d db-${{ inputs.tier }}
          Start-Sleep -Seconds 5
        }
        
        if (docker ps -q -f name=ironforge-pg-${{ inputs.tier }}) {
          Write-Host "🟢 Found Managed Service: ironforge-pg-${{ inputs.tier }}" -ForegroundColor Green
          
          # Map Ports based on Tier
          $PortMap = @{
            "l1"    = "5433"
            "l2"    = "5437"
            "e2e"   = "5434"
            "guard" = "5435"
            "l3"    = "5436"
          }
          
          $Port = $PortMap["${{ inputs.tier }}"]
          $DockerHost = if ("${{ runner.os }}" -eq "Windows") { "127.0.0.1" } else { "host.docker.internal" }
          $BaseURL = "postgresql://postgres:password@${DockerHost}:$Port"
          if ("${{ inputs.tier }}" -eq "e2e") { $idb = "ironforge_e2e" } else { $idb = "ironforge_test" }
          $TargetURL = "$($BaseURL)/$($idb)?schema=public"
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "DATABASE_URL=$TargetURL`n")
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "DIRECT_URL=$TargetURL`n")
          
          # Export Admin URL for maintenance tasks (always points to 'postgres' system DB)
          $AdminURL = "$BaseURL/postgres?schema=public"
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "ADMIN_DATABASE_URL=$AdminURL`n")
          
          if ("${{ inputs.tier }}" -eq "guard" -or "${{ inputs.tier }}" -eq "l2") {
            $UniqueId = if ("${{ github.event.pull_request.number }}") { "pr_${{ github.event.pull_request.number }}" } else { "run_${{ github.run_id }}" }
            $ShadowDB = "ironforge_shadow_$UniqueId"
            $ShadowURL = "$($BaseURL)/$($ShadowDB)?schema=public"
            [System.IO.File]::AppendAllText($env:GITHUB_ENV, "SHADOW_DATABASE_URL=$ShadowURL`n")
            [System.IO.File]::AppendAllText($env:GITHUB_ENV, "TARGET_DB=$ShadowDB`n")
            Write-Host "🚀 Exported SHADOW_DATABASE_URL and TARGET_DB ($ShadowDB) to GITHUB_ENV" -ForegroundColor Cyan
          }
          
          Write-Host "🚀 Exported DATABASE_URL and ADMIN_DATABASE_URL (Port $Port)" -ForegroundColor Cyan
        } else {
          Write-Host "❌ CRITICAL: Failed to boot Managed Service for tier: ${{ inputs.tier }}." -ForegroundColor Red
          exit 1
        }


    - name: Validate Secrets (Fast-Track)
      if: inputs.skip-validation != 'true'
      shell: pwsh
      run: .\scripts\ci\validate-secrets.ps1
      env:
        DATABASE_URL: ${{ env.DATABASE_URL }}
        NEXT_PUBLIC_SUPABASE_URL: ${{ env.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    - name: Setup pnpm
      uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4
      with:
        version: ${{ inputs.pnpm-version }}
        dest: ${{ runner.temp }}/setup-pnpm

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: ${{ inputs.cache }}

    - name: Install Dependencies
      shell: ${{ runner.os == 'Windows' && 'pwsh' || 'bash' }}
      run: pnpm install --frozen-lockfile

    - name: Generate Prisma Client (Centralized)
      shell: ${{ runner.os == 'Windows' && 'pwsh' || 'bash' }}
      run: npx prisma generate
