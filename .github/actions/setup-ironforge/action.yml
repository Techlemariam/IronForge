name: 'Setup IronForge'
description: 'Standardized Environment Setup (Node 22, pnpm 9, Caching)'
inputs:
  node-version:
    description: 'Node.js version'
    required: false
    default: '22'
  pnpm-version:
    description: 'pnpm version'
    required: false
    default: '9.15.0'
  cache:
    description: 'Cache provider'
    required: false
    default: 'pnpm'
  skip-validation:
    description: 'Skip secret validation'
    required: false
    default: 'false'

runs:
  using: "composite"
  steps:
    - name: Validate Secrets (Fast-Track)
      if: inputs.skip-validation != 'true'
      shell: pwsh
      run: .\scripts\ci\validate-secrets.ps1
      env:
        DATABASE_URL: ${{ env.DATABASE_URL }}
        NEXT_PUBLIC_SUPABASE_URL: ${{ env.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: ${{ inputs.pnpm-version }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: ${{ inputs.cache }}

    - name: Install Dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
