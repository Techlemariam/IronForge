version: '3.8'

services:
  # ──────────────────────────────────────────────
  # Database Init Container (Migrations + Seeding)
  # Runs prisma db push and seeds the database, then exits.
  # The app services depend on this to ensure DB is ready with schema.
  # ──────────────────────────────────────────────
  db-init:
    build:
      context: .
      target: dev
    container_name: ironforge-db-init
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ironforge
      DIRECT_URL: postgresql://postgres:postgres@db:5432/ironforge
      SKIP_ENV_VALIDATION: "true"
    depends_on:
      db:
        condition: service_healthy
    entrypoint: [ "sh", "-c", "npx prisma db push --skip-generate && echo '✅ Database schema applied.' && exit 0" ]
    networks:
      - ironforge-net

  # Next.js Application (Development)
  app-dev:
    build:
      context: .
      target: dev
    container_name: ironforge-app-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ironforge
      DIRECT_URL: postgresql://postgres:postgres@db:5432/ironforge
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-https://dummy.supabase.co}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-dummy}
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    networks:
      - ironforge-net

  # Next.js Application (Production-like)
  app-prod:
    build:
      context: .
      target: runner
    container_name: ironforge-app-prod
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/ironforge}
      DIRECT_URL: ${DIRECT_URL:-postgresql://postgres:postgres@db:5432/ironforge}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    networks:
      - ironforge-net

  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: ironforge-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ironforge}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ironforge-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 2s
      timeout: 1s
      retries: 3
      start_period: 5s

networks:
  ironforge-net:
    driver: bridge

volumes:
  postgres_data:
